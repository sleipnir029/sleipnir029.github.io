<div class="experience-list">
  {% for item in site.data.pro-experience-data %}
  <article class="experience-item">
    <div class="experience-header">
      <img src="{{ item.logo }}" class="experience-logo" alt="" />
      <div class="experience-meta">
        <h3 class="experience-place">{{ item.place }}</h3>
        <p class="experience-position">{{ item.position }}</p>
        <p class="experience-date">{{ item.from }} — {{ item.to }}</p>
      </div>
    </div>
    <p class="experience-desc">{{ item.description }}</p>
  </article>
  {% endfor %}
</div>
