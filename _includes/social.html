<div class="footer-social">
  {% for account in site.author %}
    {%- assign service_name = account[0] -%}
    {%- assign service_data = site.data.social-media[service_name] -%}
    {%- if service_data -%}
    <a class="social" href="{{ service_data.url }}{{ account[1] }}" target="_blank" rel="noopener noreferrer" aria-label="{{ service_name }}">
      <i class="{{ service_data.icon }} fa-2x"></i>
    </a>
    {%- endif -%}
  {% endfor %}
</div>
