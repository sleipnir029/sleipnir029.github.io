<a href="{{ project_url }}" class="project-card" target="_blank" rel="noopener noreferrer">
  {%- if project_img -%}
  <img class="project-card-img" src="{{ project_img }}" alt="{{ project_name }}" />
  {%- endif -%}
  <div class="project-card-body">
    <h3 class="project-card-title">
      {%- if project_type == "remote" -%}
      <i class="fab fa-github" title="GitHub Repository"></i>
      {%- endif -%}
      {{ project_name }}
    </h3>
    <p class="project-card-desc">{{ project_desc }}</p>
    <div class="project-card-tools" id="{{ project_id }}-tools">
      {%- if project_tools -%}
      {%- for tool in project_tools -%}
      <span class="project-tag">{{ tool }}</span>
      {%- endfor -%}
      {%- endif -%}
    </div>
  </div>
</a>
