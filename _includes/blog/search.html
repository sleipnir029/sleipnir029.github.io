<div class="blog-search">
  <div class="search-bar">
    <input id="search-input" type="text" class="search-input" placeholder="Search posts..." aria-label="Search blog posts">
    <span class="search-icon"><i class="fas fa-search"></i></span>
  </div>
  <a href="{{ '/blog/tags' | relative_url }}" class="search-tags-btn" aria-label="View all tags">
    <i class="fas fa-tags"></i> Tags
  </a>
</div>
<ul id="results-container" class="search-results"></ul>

<script src="https://cdn.rawgit.com/christian-fei/Simple-Jekyll-Search/master/dest/simple-jekyll-search.min.js"></script>
<script>
  (function() {
    var si = document.getElementById('search-input');
    var rc = document.getElementById('results-container');
    if (!si || !rc) return;
    if (typeof SimpleJekyllSearch === 'undefined') return;
    SimpleJekyllSearch({
      searchInput: si,
      resultsContainer: rc,
      searchResultTemplate: '<a href="{url}" class="search-result-item">{title}</a>',
      noResultsText: '<li class="search-no-results">No results found</li>',
      json: '{{ "/search.json" | relative_url }}'
    });
  })();
</script>
